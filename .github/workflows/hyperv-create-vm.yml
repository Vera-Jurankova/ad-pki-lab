name: create-vm

on:
  workflow_dispatch:

jobs:
  create-vm:
    runs-on: self-hosted

    steps:
      - name: Create test VM
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $vmName = "test-vm-01"
          $vmRoot = "C:\HyperV"
          $vmPath = Join-Path $vmRoot "VMs"
          $vhdRoot = Join-Path $vmRoot "VHDX"
          $vhdPath = Join-Path $vhdRoot "$vmName.vhdx"

          New-Item -ItemType Directory -Force -Path $vmPath | Out-Null
          New-Item -ItemType Directory -Force -Path $vhdRoot | Out-Null

          $existingVm = Get-VM -Name $vmName -ErrorAction SilentlyContinue
          if ($existingVm) {
            if ($existingVm.State -ne "Off") {
              Stop-VM -Name $vmName -Force
            }

            Remove-VM -Name $vmName -Force
          }

          if (Test-Path $vhdPath) {
            Remove-Item -Path $vhdPath -Force
          }

          New-VHD -Path $vhdPath -SizeBytes 50GB -Dynamic | Out-Null

          New-VM `
            -Name $vmName `
            -Generation 2 `
            -MemoryStartupBytes 2GB `
            -VHDPath $vhdPath `
            -Path $vmPath | Out-Null

          Set-VM -Name $vmName `
            -ProcessorCount 2 `
            -CheckpointType Disabled `
            -AutomaticStopAction ShutDown

          Set-VMFirmware -VMName $vmName -EnableSecureBoot Off

          Write-Output "VM ready: $vmName"
