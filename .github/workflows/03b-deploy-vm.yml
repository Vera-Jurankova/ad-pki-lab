name: 03b-Deploy Hyper-V VM

on:
  workflow_dispatch:
    inputs:
      vmName:
        description: "VM name"
        required: true
        type: string
      cpu:
        description: "vCPU count"
        required: true
        default: "2"
        type: string
      ramGb:
        description: "Startup RAM in GB"
        required: true
        default: "4"
        type: string
      hostname:
        description: "Guest hostname override (optional)"
        required: false
        default: ""
        type: string

jobs:
  deploy:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy VM and set hostname
        shell: powershell
        env:
          LAB_LOCAL_ADMIN_PASSWORD: ${{ secrets.LAB_LOCAL_ADMIN_PASSWORD }}
        run: |
          $hostname = "${{ inputs.hostname }}"
          if ([string]::IsNullOrWhiteSpace($hostname)) {
            $hostname = "${{ inputs.vmName }}"
          }

          ./scripts/Deploy-HyperVVM.ps1 `
            -VmName "${{ inputs.vmName }}" `
            -CpuCount ([int]"${{ inputs.cpu }}") `
            -MemoryStartupGB ([int]"${{ inputs.ramGb }}") `
            -Hostname $hostname `
            -AdminPassword $env:LAB_LOCAL_ADMIN_PASSWORD
