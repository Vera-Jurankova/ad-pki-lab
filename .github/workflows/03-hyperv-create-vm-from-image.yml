name: 03-hyperv-create-from-image

on:
  workflow_dispatch:

jobs:
  create-vm-from-image:
    runs-on: self-hosted

    env:
      VM_LOCAL_ADMIN_PASSWORD: ${{ secrets.VM_LOCAL_ADMIN_PASSWORD }}

    steps:
      - name: Create VM from silver image
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $vmName = "test-vm-03"
          $vmRoot = "C:\HyperV"
          $vmPath = Join-Path $vmRoot "VMs"
          $vhdRoot = Join-Path $vmRoot "VHDX"
          $imagePath = "C:\HyperV\images\win2022-base-silver.vhdx"
          $vhdPath = Join-Path $vhdRoot "$vmName.vhdx"
          $switchName = "Default Switch"
          $tempUnattend = "C:\HyperV\temp-unattend.xml"

          New-Item -ItemType Directory -Force -Path $vmPath | Out-Null
          New-Item -ItemType Directory -Force -Path $vhdRoot | Out-Null

          if (-not (Test-Path $imagePath)) {
            throw "Base image not found: $imagePath"
          }

          $existingVm = Get-VM -Name $vmName -ErrorAction SilentlyContinue
          if ($existingVm) {
            Write-Output "VM already exists: $vmName. No changes made."
            exit 0
          }

          if (Test-Path $vhdPath) {
            throw "Target VHDX already exists without matching VM: $vhdPath"
          }

          $adminPassword = $env:VM_LOCAL_ADMIN_PASSWORD
          if ([string]::IsNullOrWhiteSpace($adminPassword)) {
            throw "GitHub secret VM_LOCAL_ADMIN_PASSWORD is empty or missing."
          }

          Copy-Item -Path $imagePath -Destination $vhdPath -Force

          $unattendXml = @"
          <?xml version="1.0" encoding="utf-8"?>
          <unattend xmlns="urn:schemas-microsoft-com:unattend">
            <settings pass="oobeSystem">
              <component name="Microsoft-Windows-Shell-Setup" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS">
                <OOBE>
                  <HideEULAPage>true</HideEULAPage>
                  <NetworkLocation>Work</NetworkLocation>
                  <ProtectYourPC>1</ProtectYourPC>
                </OOBE>
                <UserAccounts>
                  <AdministratorPassword>
                    <Value>$adminPassword</Value>
                    <PlainText>true</PlainText>
                  </AdministratorPassword>
                </UserAccounts>
                <TimeZone>Central Europe Standard Time</TimeZone>
              </component>
            </settings>
          </unattend>
          "@

          $unattendXml = $unattendXml -replace '^\s{10}', ''
          $unattendXml | Out-File -FilePath $tempUnattend -Encoding utf8

          try {
            $mountedVhd = Mount-VHD -Path $vhdPath -Passthru
            Start-Sleep -Seconds 2

            $volume = $mountedVhd |
              Get-Disk |
              Get-Partition |
              Get-Volume |
              Where-Object { $_.DriveLetter } |
              Select-Object -First 1

            if (-not $volume) {
              throw "Mounted VHDX volume with drive letter was not found."
            }

            $driveLetter = "$($volume.DriveLetter):"
            $targetPath = Join-Path $driveLetter "Windows\Panther"

            New-Item -ItemType Directory -Force -Path $targetPath | Out-Null
            Copy-Item -Path $tempUnattend -Destination (Join-Path $targetPath "unattend.xml") -Force
          }
          finally {
            if (Get-VHD -Path $vhdPath | Where-Object { $_.Attached }) {
              Dismount-VHD -Path $vhdPath
            }

            if (Test-Path $tempUnattend) {
              Remove-Item -Path $tempUnattend -Force
            }
          }

          New-VM `
            -Name $vmName `
            -Generation 2 `
            -MemoryStartupBytes 2GB `
            -Path $vmPath `
            -NoVHD | Out-Null

          Add-VMHardDiskDrive `
            -VMName $vmName `
            -ControllerType SCSI `
            -ControllerNumber 0 `
            -ControllerLocation 0 `
            -Path $vhdPath | Out-Null

          $disk = Get-VMHardDiskDrive -VMName $vmName
          Set-VMFirmware -VMName $vmName -FirstBootDevice $disk

          Connect-VMNetworkAdapter `
            -VMName $vmName `
            -SwitchName $switchName

          Set-VM `
            -Name $vmName `
            -ProcessorCount 2 `
            -CheckpointType Standard `
            -AutomaticStopAction ShutDown

          Start-VM -Name $vmName | Out-Null

          Write-Output "VM deployed fully automated: $vmName"
