name: 02-hyperv-attach-iso-and-boot

on:
  workflow_dispatch:

jobs:
  attach-iso-and-boot:
    runs-on: self-hosted

    steps:
      - name: Attach ISO and boot VM
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $vmName = "test-vm-01"
          $isoPath = "C:\HyperV\ISOs\Win2022srvEval.iso"

          $vm = Get-VM -Name $vmName -ErrorAction SilentlyContinue
          if (-not $vm) {
            throw "VM not found."
          }

          if (-not (Test-Path $isoPath)) {
            throw "ISO not found."
          }

          if ($vm.State -ne "Off") {
            Stop-VM -Name $vmName -TurnOff -Force

            $timeoutSeconds = 30
            $elapsed = 0
            do {
              Start-Sleep -Seconds 1
              $elapsed++
              $vm = Get-VM -Name $vmName
            } until ($vm.State -eq "Off" -or $elapsed -ge $timeoutSeconds)

            if ($vm.State -ne "Off") {
              throw "VM did not reach Off state."
            }
          }

          $existingDvd = Get-VMDvdDrive -VMName $vmName -ErrorAction SilentlyContinue

          if (-not $existingDvd) {
            Add-VMDvdDrive `
              -VMName $vmName `
              -ControllerNumber 0 `
              -ControllerLocation 1 `
              -Path $isoPath | Out-Null
          }
          else {
            $primaryDvd = $existingDvd | Select-Object -First 1

            Set-VMDvdDrive `
              -VMName $vmName `
              -ControllerNumber $primaryDvd.ControllerNumber `
              -ControllerLocation $primaryDvd.ControllerLocation `
              -Path $isoPath

            $extraDvds = $existingDvd | Select-Object -Skip 1
            foreach ($dvd in $extraDvds) {
              Remove-VMDvdDrive `
                -VMName $vmName `
                -ControllerNumber $dvd.ControllerNumber `
                -ControllerLocation $dvd.ControllerLocation
            }
          }

          Set-VMFirmware `
            -VMName $vmName `
            -EnableSecureBoot On `
            -SecureBootTemplate MicrosoftWindows

          $dvd = Get-VMDvdDrive -VMName $vmName | Select-Object -First 1
          $hdd = Get-VMHardDiskDrive -VMName $vmName | Select-Object -First 1
          $network = Get-VMNetworkAdapter -VMName $vmName | Select-Object -First 1

          $bootOrder = @()
          if ($dvd) { $bootOrder += $dvd }
          if ($hdd) { $bootOrder += $hdd }
          if ($network) { $bootOrder += $network }

          Set-VMFirmware -VMName $vmName -BootOrder $bootOrder

          Start-VM -Name $vmName | Out-Null

          Write-Output "ISO attached and VM started."
