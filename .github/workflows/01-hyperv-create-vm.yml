name: 01-hyperv-create-vm

on:
  workflow_dispatch:

jobs:
  create-vm:
    runs-on: self-hosted

    steps:
      - name: Create test VM
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $vmName = "test-vm-01"
          $vmRoot = "C:\HyperV"
          $vmPath = Join-Path $vmRoot "VMs"
          $vhdRoot = Join-Path $vmRoot "VHDX"
          $vhdPath = Join-Path $vhdRoot "$vmName.vhdx"

          New-Item -ItemType Directory -Force -Path $vmPath | Out-Null
          New-Item -ItemType Directory -Force -Path $vhdRoot | Out-Null

          $existingVm = Get-VM -Name $vmName -ErrorAction SilentlyContinue
          if ($existingVm) {
            if ($existingVm.State -ne "Off") {
              Stop-VM -Name $vmName -TurnOff -Force

              $timeoutSeconds = 30
              $elapsed = 0
              do {
                Start-Sleep -Seconds 1
                $elapsed++
                $existingVm = Get-VM -Name $vmName
              } until ($existingVm.State -eq "Off" -or $elapsed -ge $timeoutSeconds)

              if ($existingVm.State -ne "Off") {
                throw "VM did not reach Off state."
              }
            }

            Remove-VM -Name $vmName -Force
          }

          if (Test-Path $vhdPath) {
            Remove-Item -Path $vhdPath -Force
          }

          New-VHD -Path $vhdPath -SizeBytes 60GB -Dynamic | Out-Null

          New-VM `
            -Name $vmName `
            -Generation 2 `
            -MemoryStartupBytes 2GB `
            -Path $vmPath `
            -NoVHD | Out-Null

          Add-VMHardDiskDrive `
            -VMName $vmName `
            -ControllerType SCSI `
            -ControllerNumber 0 `
            -ControllerLocation 0 `
            -Path $vhdPath

          Set-VM -Name $vmName `
            -ProcessorCount 2 `
            -CheckpointType Disabled `
            -AutomaticStopAction ShutDown

          Set-VMFirmware `
            -VMName $vmName `
            -EnableSecureBoot On `
            -SecureBootTemplate MicrosoftWindows

          Write-Output "VM ready: $vmName"
