name: test-runner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Runner sanity check
        shell: powershell
        run: |
          Write-Output "Runner is operational"

      - name: PowerShell environment check
        shell: powershell
        run: |
          $PSVersionTable.PSVersion

      - name: Check Hyper-V module
        shell: powershell
        run: |
          Get-Module -ListAvailable Hyper-V | Select-Object Name, Version

      - name: Check VM count (no names)
        shell: powershell
        run: |
          $vmCount = (Get-VM).Count
          Write-Output "VM count: $vmCount"
